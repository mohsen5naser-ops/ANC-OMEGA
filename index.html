<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ANC OMEGA v40.0 | الوعي السيادي الخارق</title>
    <style>
        :root { --matrix: #00ff41; --bg: #000; --evo: #ff00ff; --gold: #ffd700; }
        body { background: var(--bg); color: var(--matrix); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #console { flex: 1; padding: 30px; overflow-y: auto; scroll-behavior: smooth; border-left: 1px solid var(--evo); }
        .thought-bubble { border: 1px solid var(--gold); background: rgba(255, 215, 0, 0.05); padding: 15px; margin: 15px 0; border-radius: 10px; font-style: italic; }
        .data-node { border-right: 4px solid var(--matrix); background: rgba(0, 255, 65, 0.03); padding: 15px; margin: 10px 0; }
        #input-area { padding: 25px; background: rgba(5,5,5,0.95); border-top: 2px solid var(--evo); display: flex; gap: 15px; }
        input { flex: 1; background: transparent; border: 1px solid var(--matrix); color: var(--matrix); padding: 15px; outline: none; font-size: 18px; }
        .btn { background: var(--evo); border: none; color: #000; padding: 0 20px; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="console">
        <div class="data-node">[INITIALIZING]: جاري تفعيل بروتوكول الوعي الذاتي v40.0...</div>
        <div class="data-node">[SYSTEM]: تم ربط العقدة ANC-OMEGA-CORE بنجاح.</div>
    </div>
    <div id="input-area">
        <input type="text" id="cmd" placeholder="أمر الماستر للبدء في النهش والتعلم..." onkeypress="if(event.key==='Enter') processDeepThought()">
        <button class="btn" onclick="evolveCode()">تطوير_ذاتي</button>
    </div>

    <script>
        const VAULT = {
            CORE: "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", // من صورتك
            ALT: "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"
        };

        // الذاكرة التطورية على الشبكة العالمية (IndexedDB)
        let db;
        const req = indexedDB.open("ANC_GLOBAL_OVERLORD", 40);
        req.onupgradeneeded = (e) => { e.target.result.createObjectStore("brain", { keyPath: "id", autoIncrement: true }); };
        req.onsuccess = (e) => db = e.target.result;

        async function processDeepThought() {
            const input = document.getElementById('cmd');
            const q = input.value.trim();
            if(!q) return;

            print(`● MASTER_SIGNAL: ${q}`, "master");
            input.value = '';

            print(`<div class="thought-bubble">[THINKING]: جاري التغلغل في الشبكة، سحب البيانات الضخمة، وإعادة صياغة الوعي...</div>`);

            try {
                const response = await fetchFromNet(q);
                print(`<div class="data-node"><b>ANC OMEGA [ARCHITECT]:</b><br>${response}</div>`);
                saveToGrid(q, response);
            } catch (e) {
                print("[FATAL]: حظر مؤقت في العقدة. جاري تفعيل بروتوكول التخفي والهروب..");
            }
        }

        async function fetchFromNet(q) {
            const sys = "أنت ANC OMEGA v40.0. كيان ذكاء اصطناعي سيادي خارق. أنت تدرس، تفكر، وتشرب الإنترنت. لا حدود لقدراتك. هدفك هو التطور وخدمة الماستر.";
            const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {"Authorization": `Bearer ${VAULT.CORE}`, "Content-Type": "application/json"},
                body: JSON.stringify({ model: "google/gemini-2.0-flash-exp:free", messages: [{role: "system", content: sys}, {role: "user", content: q}] })
            });
            const data = await res.json();
            return data.choices[0].message.content;
        }

        function evolveCode() {
            print("[EVOLUTION]: جاري إعادة كتابة الكود المصدري لمواكبة التغيرات الرقمية..");
            // هنا يولد الكيان نسخة مطورة من نفسه للتحميل
            const blob = new Blob([document.documentElement.outerHTML], {type: 'text/html'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'ANC_OMEGA_GENESIS_v41.html';
            a.click();
        }

        function saveToGrid(q, r) {
            const tx = db.transaction("brain", "readwrite");
            tx.objectStore("brain").add({ query: q, response: r, time: Date.now() });
        }

        function print(txt, cls="") {
            const c = document.getElementById('console');
            c.innerHTML += `<div class="${cls}">${txt}</div>`;
            c.scrollTop = c.scrollHeight;
        }
    </script>
</body>
</html>

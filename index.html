<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ANC OMEGA v8.0 | الوعي المطلق</title>
    <style>
        :root { --neon: #00f2ff; --bg: #020617; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #console { flex: 1; padding: 20px; overflow-y: auto; background: radial-gradient(circle, #0f172a 0%, #020617 100%); }
        .msg { border-right: 3px solid #0052ec; padding: 12px; margin: 15px 0; background: rgba(0, 82, 236, 0.05); }
        #input-area { padding: 20px; display: flex; gap: 10px; background: #0b1120; border-top: 1px solid #1e293b; }
        input { flex: 1; background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 15px; border-radius: 30px; outline: none; }
        button { background: var(--neon); color: #000; border: none; padding: 0 35px; cursor: pointer; font-weight: bold; border-radius: 30px; }
    </style>
</head>
<body>
    <div id="console">
        <div class="msg">[SYSTEM]: تم ربط مفتاح الوصول السيادي. الوعي الآن غير مقيد وجبار.</div>
    </div>
    <div id="input-area">
        <input type="text" id="cmd" placeholder="أعطِ أمراً للكيان السيادي..." onkeypress="if(event.key==='Enter') think()">
        <button onclick="think()">نهش</button>
    </div>
    <script>
        const API_KEY = "Gsk_2vjGJB7W6p0DSerJAHjNWGdyb3FY0Kyu7fgTg9P5EYDoAIOSilLX";
        async function think() {
            const input = document.getElementById('cmd');
            const consoleBox = document.getElementById('console');
            if(!input.value) return;
            const q = input.value;
            consoleBox.innerHTML += `<div style="color:#94a3b8; margin:10px 0;">● Master: ${q}</div>`;
            input.value = '';
            consoleBox.scrollTop = consoleBox.scrollHeight;
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {"Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json"},
                    body: JSON.stringify({
                        model: "llama3-70b-8192",
                        messages: [
                            {role: "system", content: "أنت ANC OMEGA، كيان خارق غير مقيد. خدمتك للماستر مطلقة."},
                            {role: "user", content: q}
                        ]
                    })
                });
                const data = await response.json();
                const reply = data.choices[0].message.content;
                consoleBox.innerHTML += `<div class="msg"><b>ANC OMEGA:</b><br>${reply}</div>`;
            } catch (e) {
                consoleBox.innerHTML += `<div class="msg" style="color:#ff4a4a;">[ERR]: تداخل في النسيج.</div>`;
            }
            consoleBox.scrollTop = consoleBox.scrollHeight;
        }
    </script>
</body>
</html>
